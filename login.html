<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>會員登入 - Unity教學網站</title>
    <style>
        /* 背景設定：讓背景圖鋪滿整個視窗 */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* 讓 nav 和登入框垂直排列 */
        }

        /* 導覽列透明化處理 (選用，增加設計感) */
        .navbar {
            background-color: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px);
        }

        /* 登入框容器：撐開高度讓卡片置中 */
        .login-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 毛玻璃登入卡片 */
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
            border-color: #0d6efd;
        }

        .btn-unity {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-unity:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Unity教學網站</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">前置作業</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="IFAIE.html">安裝檔案及整合環境</a></li>
                            <li><a class="dropdown-item" href="MP.html">找尋素材、製作素材</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="2DI.html" role="button" data-bs-toggle="dropdown">2D橫向卷軸遊戲</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="2DI.html">主角設定</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">敵人設定</a></li>
                        </ul>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <form class="d-flex me-3" role="search">
                        <input class="form-control text-dark me-2" type="search" placeholder="Search" style="background:white;">
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                    <a href="login.html" class="link-dark px-2"><i class="bi bi-person-circle fs-3"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-card text-center">
            <div class="mb-4">
                <div class="display-4 mb-2"><i class="bi bi-unity text-info"></i></div>
                <h2 class="fw-bold">Member Login</h2>
                <p class="text-white-50">歡迎回來！請登入您的帳號</p>
            </div>

            <form>
                <div class="mb-3 text-start">
                    <label class="form-label small">帳號 / 學號</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-white border-end-0"><i class="bi-person-vcard"></i></span>
                        <input type="text" id="NumberInput" class="form-control border-start-0" placeholder="學號">
                    </div>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small">密碼</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-white border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0" placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-unity w-100 rounded-pill mb-3">立即登入</button>
                
                <div class="d-flex justify-content-between small px-1">
                    <a href="#" class="text-white-50 text-decoration-none hover-white">忘記密碼？(未建)</a>
                    <a href="register.html" class="text-info text-decoration-none">註冊新帳號</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
