<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>註冊新帳號 - Unity教學網站</title>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px);
        }
        .register-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white !important;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: #0d6efd;
            box-shadow: none;
        }
        .btn-unity {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-unity:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Unity教學網站</a>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="register-card text-center">
            <div class="mb-4">
                <div class="display-6 mb-2 text-info"><i class="bi bi-person-plus-fill"></i></div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-white-50 small">加入建功高中資訊社，開啟你的遊戲開發之路</p>
            </div>

            <form id="registerForm"> 
                <div class="mb-3 text-start">
                    <label class="form-label small">使用者名稱</label>
                    <input type="text" id="NameInput" class="form-control" placeholder="您的姓名或暱稱" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small">學號</label>
                    <input type="text" id="NumberInput" class="form-control" placeholder="請輸入學號" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small">設定密碼</label>
                    <input type="password" id="passwordInput" class="form-control" placeholder="至少 6 位數密碼" required>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-unity w-100 rounded-pill mb-3">註冊帳號</button>
                
                <div class="small">
                    <span class="text-white-50">已經有帳號了？</span>
                    <a href="login.html" class="text-info text-decoration-none">立即登入</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBKTDQ3nXOJjbJ7g-ip5Sdr32BaMzGcQEQ",
            authDomain: "unity-study-web.firebaseapp.com",
            projectId: "unity-study-web",
            storageBucket: "unity-study-web.firebasestorage.app",
            messagingSenderId: "970659563747",
            appId: "1:970659563747:web:6ea9ab6e530b28061cddd6",
            measurementId: "G-B41N9ZHECL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');

        if (registerForm) {
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault(); 

                const studentNumber = document.getElementById('NumberInput').value;
                const password = document.getElementById('passwordInput').value;

                // 技巧：將學號偽裝成 Email
                const email = studentNumber + "@test.com";

                submitBtn.disabled = true;
                submitBtn.innerText = "註冊中...";

                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        alert("註冊成功！現在幫你跳轉到登入頁面。");
                        window.location.href = "login.html";
                    })
                    .catch((error) => {
                        submitBtn.disabled = false;
                        submitBtn.innerText = "註冊帳號";

                        let errorMsg = "註冊失敗：" + error.message;
                        if (error.code === 'auth/email-already-in-use') errorMsg = "此學號已註冊過囉！";
                        if (error.code === 'auth/weak-password') errorMsg = "密碼太簡單，請至少輸入 6 位數。";
                        
                        alert(errorMsg);
                    });
            });
        }
    </script>
</body>
</html>
