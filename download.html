<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>已交檔案 - 專案上傳系統</title>
    <style>
        body { background: #f8f9fa; min-height: 100vh; }
        .sidebar { background: #212529; color: white; min-height: 100vh; position: sticky; top: 0; }
        .nav-link { color: rgba(255,255,255,0.8); transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3 shadow">
            <h4 class="fw-bold mb-4 text-info text-center"><i class="bi bi-unity"></i> 學習後台</h4>
            <ul class="nav flex-column">
                <li class="nav-item mb-2"><a href="dashboard.html" class="nav-link rounded"><i class="bi bi-cloud-arrow-up me-2"></i>作業繳交</a></li>
                <li class="nav-item mb-2"><a href="#" class="nav-link active rounded"><i class="bi bi-cloud-download me-2"></i>已交檔案</a></li>
                <li class="nav-item mb-2"><a href="index.html" class="nav-link rounded"><i class="bi bi-house me-2"></i>首頁</a></li>
                <hr class="text-white-50">
                <li class="nav-item"><a href="#" id="logoutBtn" class="nav-link text-danger rounded"><i class="bi bi-box-arrow-right me-2"></i>登出</a></li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h1 class="h3 fw-bold">已繳交的專案</h1>
                <div class="text-end">
                    <div class="fw-bold text-primary" id="displayStudentName">載入中...</div>
                    <div class="badge bg-dark">學號：<span id="displayStudentId">---</span></div>
                </div>
            </div>

            <div class="card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>檔案名稱</th>
                                <th>最後更新</th>
                                <th class="text-end">操作</th>
                            </tr>
                        </thead>
                        <tbody id="fileListBody">
                            <tr>
                                <td colspan="3" class="text-center py-5 text-muted">正在讀取雲端檔案...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getStorage, ref, listAll, getDownloadURL, getMetadata } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBKTDQ3nXOJjbJ7g-ip5Sdr32BaMzGcQEQ",
        authDomain: "unity-study-web.firebaseapp.com",
        projectId: "unity-study-web",
        storageBucket: "unity-study-web.firebasestorage.app",
        messagingSenderId: "970659563747",
        appId: "1:970659563747:web:6ea9ab6e530b28061cddd6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const storage = getStorage(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const studentId = user.email.split('@')[0];
            document.getElementById('displayStudentId').innerText = studentId;
            document.getElementById('displayStudentName').innerText = (user.displayName || studentId) + " 同學";
            loadStudentFiles(studentId);
        } else {
            window.location.href = "login.html";
        }
    });

    // 讀取檔案清單
    async function loadStudentFiles(studentId) {
        const fileListBody = document.getElementById('fileListBody');
        const listRef = ref(storage, `uploads/${studentId}`);

        try {
            const res = await listAll(listRef);
            if (res.items.length === 0) {
                fileListBody.innerHTML = `<tr><td colspan="3" class="text-center py-5 text-muted">目前沒有繳交記錄。</td></tr>`;
                return;
            }

            fileListBody.innerHTML = ""; // 清空讀取中文字

            // 逐一取得檔案資訊
            for (const itemRef of res.items) {
                const url = await getDownloadURL(itemRef);
                const metadata = await getMetadata(itemRef);
                const date = new Date(metadata.updated).toLocaleString();

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><i class="bi bi-file-zip-fill text-warning me-2"></i>${itemRef.name}</td>
                    <td class="small text-muted">${date}</td>
                    <td class="text-end">
                        <a href="${url}" target="_blank" class="btn btn-sm btn-outline-primary rounded-pill">
                            <i class="bi bi-download me-1"></i>下載
                        </a>
                    </td>
                `;
                fileListBody.appendChild(tr);
            }
        } catch (error) {
            console.error(error);
            fileListBody.innerHTML = `<tr><td colspan="3" class="text-center py-5 text-danger">讀取失敗，請確認網路連線或權限。</td></tr>`;
        }
    }

    // 登出功能
    document.getElementById('logoutBtn').addEventListener('click', () => {
        if(confirm("確定要登出嗎？")) {
            signOut(auth).then(() => window.location.href = "login.html");
        }
    });
</script>
</body>
</html>
