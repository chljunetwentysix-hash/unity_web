        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
            import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

            const firebaseConfig = {
                apiKey: "AIzaSyBKTDQ3nXOJjbJ7g-ip5Sdr32BaMzGcQEQ",
                authDomain: "unity-study-web.firebaseapp.com",
                projectId: "unity-study-web",
                storageBucket: "unity-study-web.firebasestorage.app",
                messagingSenderId: "970659563747",
                appId: "1:970659563747:web:6ea9ab6e530b28061cddd6"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth();
            const userStatusDiv = document.getElementById('userAuthStatus');

            // 監聽登入狀態切換 UI
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // 如果有設定 displayName 就顯示名字，否則顯示 Email 前綴
                    const userName = user.displayName || user.email.split('@')[0];
                    userStatusDiv.innerHTML = `
                        <span class="small me-2 text-primary fw-bold">${userName} 同學</span>
                        <a href="dashboard.html" class="btn btn-dashboard btn-sm shadow-sm">
                            <i class="bi bi-speedometer2 me-1"></i>後台
                        </a>
                    `;
                } else {
                    // 未登入，顯示原有的登入圖示
                    userStatusDiv.innerHTML = `
                        <a href="login.html" class="link-dark text-decoration-none px-2" title="會員登入">
                            <i class="bi bi-person-circle fs-3"></i>
                        </a>
                    `;
                }
            });
