<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>註冊新帳號 - Unity教學網站</title>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px);
        }
        .register-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: #0d6efd;
            box-shadow: none;
        }
        .btn-unity {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-unity:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Unity教學網站</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                </ul>
            </div>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="register-card text-center">
            <div class="mb-4">
                <div class="display-6 mb-2 text-info"><i class="bi bi-person-plus-fill"></i></div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-white-50 small">加入建功高中資訊社，開啟你的遊戲開發之路</p>
            </div>

            <form action="login.html"> <div class="mb-3 text-start">
                    <label class="form-label small">使用者名稱</label>
                    <input type="text" class="form-control" placeholder="您的姓名或暱稱" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small">學號</label>
                    <input type="text" class="form-control" placeholder="請輸入學號" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small">設定密碼</label>
                    <input type="password" class="form-control" placeholder="請輸入密碼" required>
                </div>
                
                <button type="submit" class="btn btn-unity w-100 rounded-pill mb-3">註冊帳號</button>
                
                <div class="small">
                    <span class="text-white-50">已經有帳號了？</span>
                    <a href="login.html" class="text-info text-decoration-none">立即登入</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <<!--連接資料庫-->
        <script type="module">
    // 引入 Firebase SDK (CDN 版本)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 1. 將剛才在 Firebase 複製的 Config 貼在這裡
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "unity-study-web.firebaseapp.com",
        projectId: "unity-study-web",
        storageBucket: "unity-study-web.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    // 2. 監聽註冊按鈕 (請確認你的 HTML input ID 是否對應)
    const submitBtn = document.querySelector('#register-button'); // 這裡填入你按鈕的 ID

    if(submitBtn) {
        submitBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const email = document.querySelector('#email-input').value; // 這裡填入信箱框 ID
        const password = document.querySelector('#password-input').value; // 這裡填入密碼框 ID

        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
            alert("雲端會員註冊成功！");
            window.location.href = "login.html";
            })
            .catch((error) => {
            alert("註冊出錯了：" + error.message);
            });
        });
    }
    </script>
</body>
</html>
