<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>註冊新帳號 - Unity教學網站</title>
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background-color: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(5px);
        }
        .register-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: #0d6efd;
            box-shadow: none;
        }
        .btn-unity {
            background: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-unity:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Unity教學網站</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto">
                </ul>
            </div>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="register-card text-center">
            <div class="mb-4">
                <div class="display-6 mb-2 text-info"><i class="bi bi-person-plus-fill"></i></div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-white-50 small">加入建功高中資訊社，開啟你的遊戲開發之路</p>
            </div>

            <form action="login.html"> <div class="mb-3 text-start">
                    <label class="form-label small">使用者名稱</label>
                    <input type="text" class="form-control" placeholder="您的姓名或暱稱" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small">學號</label>
                    <input type="text" class="form-control" placeholder="請輸入學號" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small">設定密碼</label>
                    <input type="password" class="form-control" placeholder="請輸入密碼" required>
                </div>
                
                <button type="submit" class="btn btn-unity w-100 rounded-pill mb-3">註冊帳號</button>
                
                <div class="small">
                    <span class="text-white-50">已經有帳號了？</span>
                    <a href="login.html" class="text-info text-decoration-none">立即登入</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!--連接資料庫-->
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
            import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

            // 1. Firebase 配置 
            const firebaseConfig = {
                apiKey: "AIzaSyBKTDQ3nXOJjbJ7g-ip5Sdr32BaMzGcQEQ",
                authDomain: "unity-study-web.firebaseapp.com",
                projectId: "unity-study-web",
                storageBucket: "unity-study-web.firebasestorage.app",
                messagingSenderId: "970659563747",
                appId: "1:970659563747:web:6ea9ab6e530b28061cddd6",
                measurementId: "G-B41N9ZHECL"
            };

            // 初始化 Firebase
            const app = initializeApp(firebaseConfig);
            const auth = getAuth();

            // 2. 註冊邏輯
            // 請確認你HTML 中：
            // 註冊按鈕 id="submitBtn"
            // 學號輸入框 id="NumberInput"
            // 密碼輸入框 id="passwordInput"
            const submitBtn = document.getElementById('submitBtn');

            if (submitBtn) {
                submitBtn.addEventListener('click', (e) => {
                e.preventDefault(); // 避免網頁重新整理
                const Number = document.getElementById('NumberInput').value;
                const password = document.getElementById('passwordInput').value;

                createUserWithNumberAndPassword(auth, Number, password)
                    .then((userCredential) => {
                    alert("註冊成功！現在幫你轉跳到登入頁面。");
                    window.location.href = "login.html"; // 成功後跳轉
                    })
                    .catch((error) => {
                    // 常見錯誤：auth/Number-already-in-use (帳號已存在)
                    // 常見錯誤：auth/weak-password (密碼太短)
                    alert("註冊失敗：" + error.message);
                    });
                });
            }
            </script>
</body>
</html>
