<!DOCTYPE html>

<html lang="zh-Hant">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <title>學生後台 - 專案上傳系統</title>

    <style>

        body { background: #f8f9fa; min-height: 100vh; }

        .sidebar { background: #212529; color: white; min-height: 100vh; position: sticky; top: 0; }

        .nav-link { color: rgba(255,255,255,0.8); transition: 0.3s; }

        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }

        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .upload-area { border: 2px dashed #dee2e6; border-radius: 15px; padding: 2rem; transition: 0.3s; background: #fff; }

        .upload-area:hover { border-color: #0d6efd; background: #f0f7ff; }

    </style>

</head>

<body>



<div class="container-fluid">

    <div class="row">

        <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3 shadow">

            <h4 class="fw-bold mb-4 text-info text-center"><i class="bi bi-unity"></i> 學習後台</h4>

            <ul class="nav flex-column">

                <li class="nav-item mb-2"><a href="#" class="nav-link active rounded"><i class="bi bi-cloud-arrow-up me-2"></i>作業繳交</a></li>

                <li class="nav-item mb-2"><a href="index.html" class="nav-link rounded"><i class="bi bi-house me-2"></i>首頁</a></li>

                <hr class="text-white-50">

                <li class="nav-item"><a href="#" id="logoutBtn" class="nav-link text-danger rounded"><i class="bi bi-box-arrow-right me-2"></i>登出</a></li>

            </ul>

        </nav>



        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">

                <h1 class="h3 fw-bold">專案繳交中心</h1>

                <div class="text-end">

                    <div class="fw-bold text-primary" id="displayStudentName">載入中...</div>

                    <div class="badge bg-dark">學號：<span id="displayStudentId">---</span></div>

                </div>

            </div>



            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="upload-area text-center mb-4">

                        <div class="display-1 text-muted mb-3"><i class="bi bi-file-earmark-zip"></i></div>

                        <h4>請選擇您的 Unity 專案壓縮檔</h4>

                        <p class="text-muted">僅支援 <span class="badge bg-warning text-dark">.zip</span> 格式</p>

                       

                        <div class="mt-4">

                            <input type="file" id="fileInput" class="form-control mb-3" accept=".zip">

                            <button id="uploadBtn" class="btn btn-primary btn-lg w-100 rounded-pill">

                                <i class="bi bi-cloud-upload me-2"></i>開始上傳

                            </button>

                        </div>



                        <div id="uploadStatusArea" class="mt-4 d-none">

                            <div class="progress mb-2" style="height: 10px;">

                                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>

                            </div>

                            <div id="statusText" class="small text-muted text-start">準備中...</div>

                        </div>

                    </div>



                    <div class="alert alert-info border-0 shadow-sm rounded-4">

                        <h6 class="fw-bold"><i class="bi bi-info-circle me-2"></i>繳交規範</h6>

                        <ul class="mb-0 small">

                            <li>請務必先將 Unity 專案資料夾壓縮為 <strong>.zip</strong> 檔。</li>

                            <li>上傳過程中請勿關閉網頁。</li>

                            <li>重複上傳將會覆蓋舊有的檔案（以學號命名）。</li>

                        </ul>

                    </div>

                </div>

            </div>

        </main>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 引入 Storage 模組

    import { getStorage, ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";



    const firebaseConfig = {

        apiKey: "AIzaSyBKTDQ3nXOJjbJ7g-ip5Sdr32BaMzGcQEQ",

        authDomain: "unity-study-web.firebaseapp.com",

        projectId: "unity-study-web",

        storageBucket: "unity-study-web.firebasestorage.app",

        messagingSenderId: "970659563747",

        appId: "1:970659563747:web:6ea9ab6e530b28061cddd6",

        measurementId: "G-B41N9ZHECL"

    };



    const app = initializeApp(firebaseConfig);

    const auth = getAuth();

    const storage = getStorage(app);



    let userEmail = "";



    // 驗證狀態

    onAuthStateChanged(auth, (user) => {

        if (user) {

            const studentId = user.email.split('@')[0];

            userEmail = user.email;

            const displayName = user.displayName ? user.displayName : studentId;

            document.getElementById('displayStudentId').innerText = studentId;

            document.getElementById('displayStudentName').innerText = displayName + " 同學";

        } else {

            window.location.href = "login.html";

        }

    });



    // 上傳功能

    const fileInput = document.getElementById('fileInput');

    const uploadBtn = document.getElementById('uploadBtn');

    const uploadStatusArea = document.getElementById('uploadStatusArea');

    const progressBar = document.getElementById('progressBar');

    const statusText = document.getElementById('statusText');



    uploadBtn.addEventListener('click', () => {

        const file = fileInput.files[0];

       

        if (!file) {

            alert("請先選擇檔案！");

            return;

        }



        // 副檔名檢查

        if (!file.name.toLowerCase().endsWith('.zip')) {

            alert("目前僅接受 .zip 壓縮檔案格式！");

            return;

        }



        const studentId = userEmail.split('@')[0];

        // 檔案命名規則：uploads/學號_檔名

        const safeFileName = file.name.replace(/\s+/g, '_'); // 將空格替換為底線

        const storageRef = ref(storage, `uploads/${studentId}/${safeFileName}`);

        const uploadTask = uploadBytesResumable(storageRef, file);



        uploadBtn.disabled = true;

        uploadStatusArea.classList.remove('d-none');



        uploadTask.on('state_changed',

            (snapshot) => {

                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;

                progressBar.style.width = progress + '%';

                statusText.innerText = `上傳進度：${Math.round(progress)}%`;

            },

            (error) => {

                console.error(error);

                alert("上傳失敗，請確認 Firebase Storage 規則已開啟！");

                uploadBtn.disabled = false;

            },

            () => {

                statusText.innerHTML = "<span class='text-success fw-bold'>✅ 上傳成功！已送交老師。</span>";

                alert("檔案上傳成功！");

                uploadBtn.disabled = false;

                fileInput.value = "";

            }

        );

    });



    // 登出

    document.getElementById('logoutBtn').addEventListener('click', (e) => {

        e.preventDefault();

        if(confirm("確定要登出嗎？")) {

            signOut(auth).then(() => {

                window.location.href = "login.html";

            });

        }

    });

</script>

</body>

</html>
